apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sonar-scan
spec:
  params:
    - name: PROJECT_KEY
    - name: PROJECT_NAME
  workspaces:
    - name: source

  steps:
    - name: sonar
      image: sonarsource/sonar-scanner-cli:latest
      env:
        - name: SONAR_TOKEN
          valueFrom:
            secretKeyRef:
              name: sonarqube-token
              key: SONAR_TOKEN
        - name: SONAR_HOST_URL
          valueFrom:
            secretKeyRef:
              name: sonarqube-token
              key: SONAR_HOST_URL

      script: |
        cd $(workspaces.source.path)

        echo "SONAR SERVER: $(params.SONAR_HOST_URL)
        $(params.PROJECT_NAME)"


        sonar-scanner \
          -Dsonar.projectKey=$(params.PROJECT_KEY) \
          -Dsonar.projectName=$(params.PROJECT_NAME) \
          -Dsonar.sources=. \
          -Dsonar.host.url=$(params.SONAR_HOST_URL) \
          -Dsonar.token=$SONAR_TOKEN